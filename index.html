<body class="flex flex-col min-h-screen justify-between p-5 max-w-md mx-auto font-sans">

        <h1 class="text-3xl font-black tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent uppercase">

    <main class="my-auto py-8">

            <div class="flex justify-between items-center border-b border-slate-800 pb-3 mb-4">

        // ==========================================
        // 🔗 TELEGRAM REDIRECT URL
        // ==========================================
        const TELEGRAM_BOT_URL = "https://t.me/+3KiO2QaEg8tjNzI0";

            { text: "🧬 Syncing verification databases...", delay: 1400 },

        const badgeEl = document.getElementById("ticker-badge");

        // Terminal animation
        logs.forEach((log) => {

                const row = document.createElement("p");
                row.className = "text-slate-300 border-l-2 border-slate-700 pl-3";
                row.innerHTML = `<span class="text-slate-500">></span> ${log.text}`;
                terminalEl.appendChild(row);
                
                if (log.text.includes("READY")) {
                    badgeEl.innerText = "Verified";
                    badgeEl.className = "text-[10px] font-bold px-2 py-0.5 rounded bg-premiumGreen/10 text-premiumGreen uppercase tracking-wider shadow-[0_0_8px_rgba(16,185,129,0.4)]";
                }
            }, log.delay);
        });

        // 🎯 THE CONVERSION TRACKER
        function handleConversion() {
            // 1. Fire the Meta Lead Event
            if (typeof fbq !== 'undefined') {
                fbq('track', 'Lead');
            }

            // 2. Redirect to your Telegram Gateway after a split-second to ensure Pixel fires
            setTimeout(() => {
                window.location.href = TELEGRAM_BOT_URL;
            }, 300);
