<!DOCTYPE html>
<html lang="en" class="bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrashMinesWin - Live Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { premiumGold: '#f59e0b', premiumGreen: '#10b981' }
                }
            }
        }
    </script>

    <!-- Custom Animations for the Live Feed -->
    <style>
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .feed-card-1 { 
            animation: floatUp 0.6s ease-out forwards; 
            animation-delay: 0.8s; 
            opacity: 0; 
        }
        .feed-card-2 { 
            animation: floatUp 0.6s ease-out forwards; 
            animation-delay: 1.6s; 
            opacity: 0; 
        }
    </style>
    
    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '808494358652018');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=808494358652018&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
</head>
<body class="flex flex-col min-h-screen justify-between p-5 max-w-md mx-auto font-sans">

    <!-- Header -->
    <header class="text-center mt-8">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-900 border border-slate-800 text-xs text-slate-400 mb-4 shadow-sm">
            <span class="w-2 h-2 rounded-full bg-premiumGreen animate-pulse"></span>
            SYSTEM ONLINE: SECURE NODE
        </div>
        <h1 class="text-3xl font-black tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent uppercase">
            CrashMinesWin
        </h1>
        <p class="text-sm text-slate-400 mt-2">High-Volume Predictive Routing Engine</p>
    </header>

    <main class="my-auto py-6 space-y-6">
        
        <!-- Simulated Terminal Box -->
        <div class="bg-slate-900/90 rounded-xl p-5 border border-slate-800/80 shadow-2xl backdrop-blur-md">
            <div class="flex justify-between items-center border-b border-slate-800 pb-3 mb-4">
                <span class="text-xs font-mono text-slate-500">ENGINE_LOGS // STATUS</span>
                <span id="ticker-badge" class="text-[10px] font-bold px-2 py-0.5 rounded bg-premiumGold/10 text-premiumGold uppercase tracking-wider">
                    Scanning
                </span>
            </div>
            <div id="terminal" class="font-mono text-xs space-y-3 min-h-[120px] transition-all duration-300">
                <!-- JavaScript handles the text insertion here -->
            </div>
        </div>

        <!-- Social Proof / Won Signals Section -->
        <div class="space-y-3">
            <h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-wider pl-1">Live Feed // Verified Targets</h3>
            
            <!-- Animated Card 1 -->
            <div class="feed-card-1 flex items-center justify-between bg-gradient-to-r from-slate-900 to-slate-800 border border-premiumGreen/30 shadow-[0_0_12px_rgba(16,185,129,0.15)] p-3 rounded-lg">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">🚀</span>
                    <div>
                        <p class="text-sm font-bold text-white">Crash: 12.50x</p>
                        <p class="text-[10px] text-slate-400">Cashout Executed</p>
                    </div>
                </div>
                <span class="text-[10px] font-bold text-premiumGreen bg-premiumGreen/10 px-2 py-1 rounded animate-pulse">✅ WON</span>
            </div>

            <!-- Animated Card 2 -->
            <div class="feed-card-2 flex items-center justify-between bg-gradient-to-r from-slate-900 to-slate-800 border border-premiumGreen/30 shadow-[0_0_12px_rgba(16,185,129,0.15)] p-3 rounded-lg">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">💣</span>
                    <div>
                        <p class="text-sm font-bold text-white">Mines: 5 Safes</p>
                        <p class="text-[10px] text-slate-400">Target Cleared</p>
                    </div>
                </div>
                <span class="text-[10px] font-bold text-premiumGreen bg-premiumGreen/10 px-2 py-1 rounded animate-pulse">✅ WON</span>
            </div>
        </div>

    </main>

    <!-- Footer & CTA -->
    <footer class="mb-8 space-y-4">
        <div class="text-center">
            <p class="text-xs text-slate-500">🔒 Secure Connection to Telegram Gateway</p>
        </div>
        <button onclick="handleConversion()" class="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-slate-950 font-extrabold py-4 px-6 rounded-xl shadow-[0_0_15px_rgba(245,158,11,0.3)] active:scale-[0.98] transition-transform text-center block text-base tracking-wide uppercase">
            Activate System & Join Now
        </button>
    </footer>

    <script>
        // ========================================================
        // 🔗 TARGET VARIABLE: CHANGE THIS TO YOUR BOT LINK
        // ========================================================
        const TELEGRAM_BOT_URL = "https://t.me/Autocash1_bot"; 
        
        const logs = [
            { text: "📡 Connecting to global tracking matrix...", delay: 300 },
            { text: "🧬 Syncing verification databases...", delay: 1200 },
            { text: "📊 Calibrating next entry parameters...", delay: 2200 },
            { text: "🟢 READY: Awaiting user activation.", delay: 3200 }
        ];

        const terminalEl = document.getElementById("terminal");
        const badgeEl = document.getElementById("ticker-badge");

        // Terminal animation
        logs.forEach((log) => {
            setTimeout(() => {
                const row = document.createElement("p");
                row.className = "text-slate-300 border-l-2 border-slate-700 pl-3";
                row.innerHTML = `<span class="text-slate-500">></span> ${log.text}`;
                terminalEl.appendChild(row);
                
                if (log.text.includes("READY")) {
                    badgeEl.innerText = "Online";
                    badgeEl.className = "text-[10px] font-bold px-2 py-0.5 rounded bg-premiumGreen/10 text-premiumGreen uppercase tracking-wider shadow-[0_0_8px_rgba(16,185,129,0.4)]";
                }
            }, log.delay);
        });

        // 🎯 THE CONVERSION TRACKER
        function handleConversion() {
            if (typeof fbq !== 'undefined') {
                fbq('track', 'Lead');
            }
            setTimeout(() => {
                window.location.href = TELEGRAM_BOT_URL;
            }, 300); 
        }
    </script>
</body>
</html>
